<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>YYOKAI | Artist Auth</title>

  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    html,body{min-height:100%;background:#000}
    body{font-family:Arial,sans-serif;color:#fff;background:radial-gradient(circle at 50% 18%,rgba(185,0,35,.22),transparent 34%),linear-gradient(to bottom,#000,#070202 45%,#000);overflow-x:hidden;position:relative}
    body::before{content:"妖 鬼 狐 墨 夜 刺青";position:fixed;inset:0;color:rgba(255,255,255,.022);font-size:90px;letter-spacing:34px;line-height:1.5;transform:rotate(-12deg) scale(1.15);pointer-events:none;z-index:0}
    header{position:fixed;top:0;width:100%;padding:22px 34px;display:flex;justify-content:space-between;align-items:center;z-index:10}
    .lang{display:flex;gap:8px;padding:7px;border-radius:999px;background:rgba(0,0,0,.62);border:1px solid rgba(255,255,255,.12);backdrop-filter:blur(18px)}
    .lang button{border:none;background:transparent;color:#9f9f9f;padding:9px 16px;border-radius:999px;font-weight:900;font-size:13px;cursor:pointer}
    .lang button.active{background:#f4f0eb;color:#050505}
    .back{color:#aaa;text-decoration:none;font-size:14px}
    .back:hover{color:#fff}
    .page{position:relative;z-index:2;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:100px 20px 70px}
    .wrap{width:100%;max-width:480px;text-align:center}
    .seal{color:#e5092f;font-weight:900;margin-bottom:16px;text-shadow:0 0 18px rgba(229,9,47,.75)}
    .logo{font-size:clamp(48px,12vw,84px);font-weight:950;letter-spacing:.14em;margin-bottom:28px;color:#f5f0eb;text-shadow:0 0 8px rgba(255,255,255,.2),0 0 28px rgba(229,9,47,.45)}
    .panel{padding:28px;border-radius:34px;background:linear-gradient(180deg,rgba(255,255,255,.075),rgba(255,255,255,.018));border:1px solid rgba(255,255,255,.12);backdrop-filter:blur(24px);box-shadow:0 34px 90px rgba(0,0,0,.65);text-align:left}
    .tabs{display:flex;gap:8px;margin-bottom:24px;padding:6px;border-radius:999px;background:rgba(0,0,0,.55);border:1px solid rgba(255,255,255,.08)}
    .tabs button{flex:1;border:0;padding:12px;border-radius:999px;background:transparent;color:#999;font-weight:900;cursor:pointer}
    .tabs button.active{background:#f5f0eb;color:#050505}
    form{display:none;flex-direction:column;gap:14px}
    form.active{display:flex}
    label{display:block;margin-bottom:7px;font-size:13px;color:#aaa}
    input{width:100%;padding:15px 16px;border-radius:16px;border:1px solid rgba(255,255,255,.13);background:rgba(255,255,255,.055);color:#fff;outline:none;font-size:15px}
    input:focus{border-color:rgba(229,9,47,.75);box-shadow:0 0 0 3px rgba(229,9,47,.12)}
    .pass-wrap{position:relative}
    .pass-wrap input{padding-right:58px}
    .pass-toggle{position:absolute;right:10px;top:50%;transform:translateY(-50%);width:38px;height:38px;border:0;border-radius:12px;background:rgba(255,255,255,.08);color:#fff;cursor:pointer}
    .submit{margin-top:8px;padding:15px 18px;border:0;border-radius:999px;background:#e5092f;color:#fff;font-weight:950;cursor:pointer;box-shadow:0 0 30px rgba(229,9,47,.32)}
    .submit:disabled{opacity:.65;cursor:not-allowed}
    .forgot{border:0;background:transparent;color:#aaa;font-weight:900;cursor:pointer;padding:8px;text-align:center}
    .forgot:hover{color:#fff}
    .msg{margin-top:16px;min-height:22px;color:#ff5b74;font-size:14px;text-align:center;line-height:1.45}
    .msg.ok{color:#7dffb1}
    .modal-backdrop{position:fixed;inset:0;z-index:30;display:none;place-items:center;padding:20px;background:rgba(0,0,0,.78);backdrop-filter:blur(14px)}
    .modal-backdrop.open{display:grid}
    .modal{width:100%;max-width:440px;padding:26px;border-radius:30px;background:linear-gradient(180deg,rgba(255,255,255,.095),rgba(255,255,255,.025));border:1px solid rgba(255,255,255,.13);box-shadow:0 34px 100px rgba(0,0,0,.8)}
    .modal-head{display:flex;justify-content:space-between;gap:16px;align-items:center;margin-bottom:18px}
    .modal h3{font-size:24px}
    .close{width:42px;height:42px;border-radius:14px;border:1px solid rgba(255,255,255,.12);background:rgba(255,255,255,.06);color:#fff;font-size:22px;cursor:pointer}
    .modal p{color:#aaa;line-height:1.55;margin-bottom:16px}
    .modal .submit{width:100%}
    .footer{position:fixed;left:0;bottom:0;width:100%;z-index:5;padding:14px 24px 18px;background:#000;border-top:1px solid rgba(255,255,255,.035);opacity:.42;text-align:center}
    .footer-links{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin-bottom:8px;font-size:11px}
    .footer-links a{color:#5d5d5d;text-decoration:none}
    .footer-bottom{color:#3f3f3f;font-size:10px;letter-spacing:.08em}
    @media(max-width:600px){header{padding:18px}.lang button{padding:8px 12px}.panel{padding:22px}.footer{position:relative;margin-top:20px}}
  </style>
</head>

<body>
<header>
  <div class="lang">
    <button class="active" onclick="setLang('uk')">Українська</button>
    <button onclick="setLang('en')">English</button>
  </div>
  <a href="/index.html" class="back" data-i18n="back">← Назад</a>
</header>

<main class="page">
  <section class="wrap">
    <div class="seal">妖</div>
    <div class="logo">YYOKAI</div>

    <div class="panel">
      <div class="tabs">
        <button id="tabRegister" class="active" type="button" data-i18n="tabRegister">Реєстрація</button>
        <button id="tabLogin" type="button" data-i18n="tabLogin">Вхід</button>
      </div>

      <form id="registerForm" class="active">
        <div>
          <label data-i18n="nameLabel">Імʼя майстра</label>
          <input id="regName" type="text" placeholder="YYOKAI Artist" required />
        </div>

        <div>
          <label>Email</label>
          <input id="regEmail" type="email" placeholder="artist@email.com" required />
        </div>

        <div>
          <label data-i18n="passwordLabel">Пароль</label>
          <div class="pass-wrap">
            <input id="regPassword" type="password" placeholder="Мінімум 6 символів" required />
            <button class="pass-toggle" type="button" onclick="togglePass('regPassword',this)">👁</button>
          </div>
        </div>

        <button id="registerBtn" class="submit" type="submit" data-i18n="registerBtn">Створити профіль</button>
      </form>

      <form id="loginForm">
        <div>
          <label>Email</label>
          <input id="loginEmail" type="email" placeholder="artist@email.com" required />
        </div>

       <div>
  <label data-i18n="passwordLabel2">Пароль</label>
  <div class="pass-wrap">
    <!-- Змінюємо placeholder на універсальний -->
    <input id="loginPassword" type="password" placeholder="Пароль | Password" required />
    <button class="pass-toggle" type="button" onclick="togglePass('loginPassword',this)">👁</button>
  </div>
</div>


        <button id="loginBtn" class="submit" type="submit" data-i18n="loginBtn">Увійти в майстерню</button>

        <button class="forgot" type="button" onclick="openResetModal()" data-i18n="forgotPassword">
          Забули пароль?
        </button>
      </form>

      <p id="msg" class="msg"></p>
    </div>
  </section>
</main>

<section class="modal-backdrop" id="resetModal">
  <div class="modal">
    <div class="modal-head">
      <h3 data-i18n="resetTitle">Відновлення пароля</h3>
      <button class="close" type="button" onclick="closeResetModal()">×</button>
    </div>

    <p data-i18n="resetText">
      Введіть email. Ми надішлемо лист для зміни пароля через Firebase.
    </p>

    <label>Email</label>
    <input id="resetEmail" type="email" placeholder="artist@email.com" />

    <button id="resetBtn" class="submit" type="button" onclick="resetPassword()" data-i18n="sendReset">
      Надіслати лист
    </button>
  </div>
</section>

<footer class="footer">
  <div class="footer-links">
    <a href="/privacy.html">Privacy</a>
    <a href="/terms.html">Terms</a>
    <a href="/cookies.html">Cookies</a>
    <a href="/contact.html">Contact</a>
  </div>
  <div class="footer-bottom">© 2026 YYOKAI SYSTEM. All rights reserved.</div>
</footer>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
  getAuth,
  createUserWithEmailAndPassword,
  signInWithEmailAndPassword,
  sendPasswordResetEmail,
  setPersistence,
  browserLocalPersistence,
  onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import { getDatabase, ref, set, update } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const BASE_PATH="/yyokai/yyokai_tattoo/";

const firebaseConfig = {
  apiKey: "AIzaSyALs-ZgFX7auGxRQ2EeQnVngjnejimPLV4",
  authDomain: "yyokai-tattoo-system.firebaseapp.com",
  databaseURL: "https://yyokai-tattoo-system-default-rtdb.europe-west1.firebasedatabase.app/",
  projectId: "yyokai-tattoo-system",
  storageBucket: "yyokai-tattoo-system.firebasestorage.app",
  messagingSenderId: "995298614954",
  appId: "1:995298614954:web:e4039c69fcb0541a95fad3"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
  await setPersistence(auth,browserLocalPersistence);

onAuthStateChanged(auth,user=>{
  if(user){
    window.location.replace(BASE_PATH+"artist-dashboard.html");
  }
});
const db = getDatabase(app);

let currentLang="uk";

const tabRegister=document.getElementById("tabRegister");
const tabLogin=document.getElementById("tabLogin");
const registerForm=document.getElementById("registerForm");
const loginForm=document.getElementById("loginForm");
const msg=document.getElementById("msg");
const registerBtn=document.getElementById("registerBtn");
const loginBtn=document.getElementById("loginBtn");
const resetBtn=document.getElementById("resetBtn");

const text={
  uk:{
    back:"← Назад",tabRegister:"Реєстрація",tabLogin:"Вхід",nameLabel:"Імʼя майстра",
    passwordLabel:"Пароль",passwordLabel2:"Пароль",registerBtn:"Створити профіль",loginBtn:"Увійти в майстерню",
    registerLoading:"Створюємо твій профіль YYOKAI...",loginLoading:"Перевіряємо доступ до майстерні...",
    registerSuccess:"Дякую, що зареєструвались та вибрали нас. Відкриваємо вашу майстерню...",
    loginSuccess:"Вхід успішний. Відкриваємо вашу майстерню...",
    fillFields:"Заповни email і пароль.",emailUsed:"Цей email вже зареєстрований. Перейдіть у вкладку Вхід.",
    invalidLogin:"Невірний email або пароль.",weakPassword:"Пароль має бути мінімум 6 символів.",error:"Помилка Firebase:",
    forgotPassword:"Забули пароль?",resetTitle:"Відновлення пароля",
    resetText:"Введіть email. Ми надішлемо лист для зміни пароля через Firebase.",
    sendReset:"Надіслати лист",resetLoading:"Надсилаємо лист...",
    resetSent:"Лист для зміни пароля надіслано. Перевірте пошту та поверніться до входу.",
    enterEmail:"Введіть email."
  },
  en:{
    back:"← Back",tabRegister:"Register",tabLogin:"Login",nameLabel:"Artist name",
    passwordLabel:"Password",passwordLabel2:"Password",registerBtn:"Create profile",loginBtn:"Enter workshop",
    registerLoading:"Creating your YYOKAI profile...",loginLoading:"Checking access to your workshop...",
    registerSuccess:"Thank you for registering and choosing us. Opening your workshop...",
    loginSuccess:"Login successful. Opening your workshop...",
    fillFields:"Please enter email and password.",emailUsed:"This email is already registered. Go to the Login tab.",
    invalidLogin:"Invalid email or password.",weakPassword:"Password must be at least 6 characters.",error:"Firebase error:",
    forgotPassword:"Forgot password?",resetTitle:"Password recovery",
    resetText:"Enter your email. We will send a Firebase password reset link.",
    sendReset:"Send reset email",resetLoading:"Sending email...",
    resetSent:"Password reset email sent. Check your inbox and return to login.",
    enterEmail:"Enter your email."
  }
};

function showMessage(keyOrText,type="error",isKey=true){
  msg.textContent=isKey?(text[currentLang][keyOrText]||keyOrText):keyOrText;
  msg.classList.toggle("ok",type==="ok");
}

function switchTab(type){
  msg.textContent="";
  msg.classList.remove("ok");

  if(type==="register"){
    tabRegister.classList.add("active");
    tabLogin.classList.remove("active");
    registerForm.classList.add("active");
    loginForm.classList.remove("active");
  }else{
    tabLogin.classList.add("active");
    tabRegister.classList.remove("active");
    loginForm.classList.add("active");
    registerForm.classList.remove("active");
  }
}

tabRegister.addEventListener("click",()=>switchTab("register"));
tabLogin.addEventListener("click",()=>switchTab("login"));

function firebaseMessage(error){
  const code=error.code||"";
  if(code==="auth/email-already-in-use")return text[currentLang].emailUsed;
  if(code==="auth/invalid-credential")return text[currentLang].invalidLogin;
  if(code==="auth/wrong-password")return text[currentLang].invalidLogin;
  if(code==="auth/user-not-found")return text[currentLang].invalidLogin;
  if(code==="auth/weak-password")return text[currentLang].weakPassword;
  return text[currentLang].error+" "+error.message;
}

registerForm.addEventListener("submit",async(e)=>{
  e.preventDefault();

  const name=document.getElementById("regName").value.trim();
  const email=document.getElementById("regEmail").value.trim();
  const password=document.getElementById("regPassword").value;

  if(!email||!password){showMessage("fillFields");return;}

  try{
    registerBtn.disabled=true;
    showMessage("registerLoading","ok");

    const userCred=await createUserWithEmailAndPassword(auth,email,password);
    const user=userCred.user;

    await set(ref(db,"users/"+user.uid),{
      uid:user.uid,name:name||"Guest Artist",email,role:"artist",
      balance:0,planKey:"free",stencilCredits:3,createdAt:Date.now(),lastLogin:Date.now()
    });
    localStorage.setItem("yyokai_last_email",email);
    showMessage("registerSuccess","ok");
    setTimeout(()=>window.location.replace(BASE_PATH+"artist-dashboard.html"),1200);

  }catch(error){
    registerBtn.disabled=false;
    showMessage(firebaseMessage(error),"error",false);
  }
});

loginForm.addEventListener("submit",async(e)=>{
  e.preventDefault();

  const email=document.getElementById("loginEmail").value.trim();
  const password=document.getElementById("loginPassword").value;

  if(!email||!password){showMessage("fillFields");return;}

  try{
    loginBtn.disabled=true;
    showMessage("loginLoading","ok");

    const userCred=await signInWithEmailAndPassword(auth,email,password);
    const user=userCred.user;

    await update(ref(db,"users/"+user.uid),{
      uid:user.uid,email:user.email||email,lastLogin:Date.now()
    });
    localStorage.setItem("yyokai_last_email",email);
    showMessage("loginSuccess","ok");
    setTimeout(()=>window.location.replace(BASE_PATH+"artist-dashboard.html"),700);

  }catch(error){
    loginBtn.disabled=false;
    showMessage(firebaseMessage(error),"error",false);
  }
});

window.togglePass=function(inputId,btn){
  const input=document.getElementById(inputId);
  if(input.type==="password"){
    input.type="text";
    btn.textContent="🙈";
  }else{
    input.type="password";
    btn.textContent="👁";
  }
};

window.openResetModal=function(){
  const loginEmail=document.getElementById("loginEmail").value.trim();
  document.getElementById("resetEmail").value=loginEmail;
  document.getElementById("resetModal").classList.add("open");
};

window.closeResetModal=function(){
  document.getElementById("resetModal").classList.remove("open");
};

window.resetPassword=async function(){
  const email=document.getElementById("resetEmail").value.trim();

  if(!email){
    showMessage("enterEmail");
    return;
  }

  try{
    resetBtn.disabled=true;
    resetBtn.textContent=text[currentLang].resetLoading;

    await sendPasswordResetEmail(auth,email);

    closeResetModal();
    switchTab("login");
    document.getElementById("loginEmail").value=email;

    showMessage("resetSent","ok");

  }catch(error){
    showMessage(firebaseMessage(error),"error",false);
  }finally{
    resetBtn.disabled=false;
    resetBtn.textContent=text[currentLang].sendReset;
  }
};
const savedEmail=localStorage.getItem("yyokai_last_email");

if(savedEmail){
  document.getElementById("loginEmail").value=savedEmail;
  document.getElementById("regEmail").value=savedEmail;
}
  
window.setLang=function(lang){
  currentLang=lang;
  document.documentElement.lang=lang;

  Object.keys(text[lang]).forEach(key=>{
    const el=document.querySelector(`[data-i18n="${key}"]`);
    if(el)el.textContent=text[lang][key];
  });

  document.querySelectorAll(".lang button").forEach(btn=>btn.classList.remove("active"));
  document.querySelector(`[onclick="setLang('${lang}')"]`).classList.add("active");

  msg.textContent="";
  msg.classList.remove("ok");
};
</script>
</body>
</html>
